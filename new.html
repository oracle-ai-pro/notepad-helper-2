<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Prestige HQ | Oracle Studio v3.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo-area">
            <button class="menu-trigger" onclick="togglePanel('left')">Ремиксы</button>
            <span class="logo-text">PRESTIGE HQ</span>
            <button class="menu-trigger" onclick="togglePanel('right')">Оракул</button>
        </div>
    </header>

    <div class="main-container">
        <aside id="left-panel">
            </aside>

        <main class="center-block">
            <div id="editor-header">SOURCE_CODE // CORE.worldpack</div>
            <textarea id="source-code"></textarea>
        </main>

        <aside id="right-panel">
            </aside>
    </div>
    <script src="script.js"></script>
</body>
</html>
