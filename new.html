<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Notepad Helper | Prestige HQ</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,400,1,0" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0b10;
            --surface: #14151f;
            --surface-variant: #1f202e;
            --on-surface: #e3e2e6;
            --primary: #adc6ff;
            --secondary: #e8bbf1;
            --grad: linear-gradient(90deg, #02b6ed 0%, #e60ced 100%);
        }
        .material-symbols-rounded { font-size: 20px; vertical-align: middle; }
        /* Остальные стили те же, обновляем только содержимое */
    </style>
</head>
<body>
    <header>
        <div class="logo-area">
            <button class="menu-trigger-btn purple-trigger" onclick="toggleLeftPanel()"><span class="material-symbols-rounded">apps</span> Ремиксы</button>
            <span class="nav-logo-text">Notepad Helper | Prestige HQ</span>
            <button class="menu-trigger-btn" onclick="toggleRightPanel()"><span class="material-symbols-rounded">psychology</span> Оракул</button>
        </div>
        <div class="avatar"><span class="material-symbols-rounded">build</span></div>
    </header>

    <button class="action-btn save-btn" onclick="saveCodeToLocal()"><span class="material-symbols-rounded">save</span> Сохранить</button>
    
    <span style="font-size: 11px; color: var(--secondary);"><span class="material-symbols-rounded">key</span> Ключ доступа</span>
    
    <select id="voice-select" class="meta-select">
        <option value="lamirk"><span class="material-symbols-rounded">build</span> Ламирк</option>
        <option value="murzik"><span class="material-symbols-rounded">pets</span> Мурзик</option>
    </select>

    <script>
        // ... (логика та же, иконки теперь подтянутся автоматически через стили)
    </script>
</body>
</html>
