<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>LMSH IDE | Flexible Interface</title>
    <style>
        :root {
            --cyan: #00f2ff;
            --bg: #050508;
            --panel-bg: #0a0a0f;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body { 
            background: var(--bg); color: #fff; font-family: 'Fira Code', monospace;
            margin: 0; display: flex; height: 100vh; overflow: hidden;
        }

        /* Общие стили панелей */
        .panel {
            background: var(--panel-bg);
            border: 1px solid #222;
            transition: width var(--transition), min-width var(--transition), opacity var(--transition);
            display: flex; flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        /* ЛЕВАЯ ПАНЕЛЬ (Инфо) */
        #left-panel { width: 260px; min-width: 260px; }
        #left-panel.collapsed { width: 0; min-width: 0; border: none; opacity: 0; }

        /* ЦЕНТР (Код) */
        .main-editor {
            flex: 1;
            display: flex; flex-direction: column;
            background: #0d0d12;
            padding: 20px;
        }

        /* ПРАВАЯ ПАНЕЛЬ (Оракул) */
        #right-panel { width: 320px; min-width: 320px; }
        #right-panel.collapsed { width: 0; min-width: 0; border: none; opacity: 0; }

        /* Кнопки сворачивания */
        .toggle-btn {
            position: fixed; top: 10px; z-index: 100;
            background: #1a1a25; border: 1px solid var(--cyan);
            color: var(--cyan); cursor: pointer; padding: 5px 10px;
            border-radius: 4px; font-size: 10px; text-transform: uppercase;
        }
        .btn-left { left: 10px; }
        .btn-right { right: 10px; }

        textarea {
            width: 100%; height: 100%; background: transparent;
            color: #00ffaa; border: none; outline: none; resize: none;
            font-size: 14px; line-height: 1.5;
        }

        .header { padding: 10px; font-size: 12px; color: var(--cyan); border-bottom: 1px solid #222; }
    </style>
</head>
<body>

    <button class="toggle-btn btn-left" onclick="togglePanel('left-panel')">☰ Pack Info</button>
    <button class="toggle-btn btn-right" onclick="togglePanel('right-panel')">Oracle 💧</button>

    <aside class="panel" id="left-panel">
        <div class="header">PACK DETAILS</div>
        <div style="padding: 20px; font-size: 13px;">
            <p>Name: All Pack Dates</p>
            <p style="color: #666;">GUID: 214e34ff...</p>
            <hr style="border: 0.5px solid #222; margin: 15px 0;">
            <p style="color: #ffaa00;">Kosmo 3.4 Lore Active</p>
        </div>
    </aside>

    <main class="main-editor">
        <div style="margin-bottom: 10px; font-size: 11px; color: #444;">SOURCE_CODE // ABP_ENGINE</div>
        <textarea placeholder="Вставь код сюда...">v003
---PACK START---
{"worldPackGUID": "..."}</textarea>
    </main>

    <aside class="panel" id="right-panel">
        <div class="header">ОРАКУЛ: ИДЕИ 🔑)</div>
        <div style="flex: 1; padding: 15px; font-size: 13px; color: #888;">
            <div style="background: rgba(0,242,255,0.05); padding: 10px; border-radius: 5px;">
                <b>Oracle:</b> Брат, я готов! Сверни меня, если нужно больше места для кода. Я всё равно буду следить за процессом.
            </div>
        </div>
        <input type="text" placeholder="Спросить Оракула..." style="margin: 10px; padding: 10px; background: #151520; border: 1px solid #333; color: #fff;">
    </aside>

    <script>
        function togglePanel(id) {
            const panel = document.getElementById(id);
            panel.classList.toggle('collapsed');
        }
    </script>
</body>
</html>
