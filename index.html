<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notepad Helper 2 | Oracle Pro</title>
    <style>
        :root {
            --cyan: #00ffff;
            --purple: #8a2be2;
            --deep-dark: #050508;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --accent-gradient: linear-gradient(135deg, var(--cyan), var(--purple));
        }

        * { box-sizing: border-box; }
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background: var(--deep-dark); 
            color: #e0e0e0; 
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
        }

        /* Анимированный фон */
        .bg-glow {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #050508 100%);
            z-index: -1;
        }

        /* Главный контейнер */
        #app-shell {
            display: flex; height: 100vh; padding: 20px; gap: 20px;
        }

        /* Левая панель (Миры) */
        .sidebar {
            width: 280px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .sidebar h2 { font-size: 1.1rem; color: var(--cyan); text-transform: uppercase; letter-spacing: 2px; }

        /* Центр (Редактор) */
        .editor-zone {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .editor-header {
            height: 60px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 18px;
            display: flex; align-items: center; padding: 0 20px;
            justify-content: space-between;
        }

        #code-area {
            flex: 1;
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border);
            border-radius: 20px;
            color: #00ffcc;
            font-family: 'Fira Code', monospace;
            padding: 25px;
            font-size: 14px;
            line-height: 1.6;
            outline: none;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.5);
        }

        /* Fly Oracle (Правая панель) */
        #oracle-fly {
            width: 350px;
            background: linear-gradient(180deg, rgba(15,15,25,0.95) 0%, rgba(5,5,10,0.98) 100%);
            backdrop-filter: blur(30px);
            border-left: 1px solid var(--purple);
            box-shadow: -10px 0 50px rgba(0,0,0,0.8);
            position: fixed; right: 0; top: 0; height: 100%;
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
            display: flex; flex-direction: column;
        }

        #oracle-fly.collapsed { transform: translateX(350px); }

        .oracle-trigger {
            position: absolute; left: -50px; top: 30px;
            width: 50px; height: 50px;
            background: var(--accent-gradient);
            border-radius: 12px 0 0 12px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 24px;
            box-shadow: -5px 0 15px rgba(138, 43, 226, 0.5);
        }

        /* Капля Оракула */
        .drop-logo {
            width: 80px; height: 80px;
            margin: 40px auto 20px;
            background: var(--accent-gradient);
            border-radius: 50% 50% 50% 5%;
            transform: rotate(-45deg);
            animation: pulse-drop 3s infinite alternate;
        }

        @keyframes pulse-drop {
            from { box-shadow: 0 0 20px var(--cyan); transform: rotate(-45deg) scale(1); }
            to { box-shadow: 0 0 40px var(--purple); transform: rotate(-45deg) scale(1.05); }
        }

        .chat-box {
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 12px;
        }

        .msg { padding: 10px 15px; border-radius: 15px; max-width: 85%; line-height: 1.4; }
        .ai { background: rgba(0, 255, 255, 0.1); border: 1px solid var(--cyan); align-self: flex-start; color: var(--cyan); }
        .user { background: rgba(138, 43, 226, 0.1); border: 1px solid var(--purple); align-self: flex-end; color: #e0b0ff; }

        .input-wrap { padding: 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; }
        input[type="text"] {
            flex: 1; background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            padding: 12px; border-radius: 12px; color: white;
        }

        .banana-btn {
            background: #ffcc00; color: black; border: none; padding: 10px 15px;
            border-radius: 12px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    
    <div id="app-shell">
        <aside class="sidebar">
            <h2>LMSH Worlds</h2>
            <div style="flex: 1; font-size: 0.9em; opacity: 0.6;">
                📁 Traitor_Level_2.1<br>
                📁 Kosmo_Circle_3.3<br>
                📁 MIUI_Banana_MOD
            </div>
            <div id="auth-info" style="font-size: 0.7em; color: var(--purple);">
                ID: lamirkmurziks... @oracle.com
            </div>
        </aside>

        <main class="editor-zone">
            <header class="editor-header">
                <div><strong>Notepad Helper 2</strong> <small style="color: var(--purple);">V003-GIT</small></div>
                <button onclick="saveToGit()" style="background: var(--accent-gradient); border: none; color: white; padding: 8px 20px; border-radius: 10px; cursor: pointer;">Push to GitHub 🔑</button>
            </header>
            <textarea id="code-area" spellcheck="false">// Загрузка миллиарда символов...
{
  "pack": "MIUI Custom 🍌",
  "status": "Prestige HQ",
  "traitor_level": "2.1"
}</textarea>
        </main>
    </div>

    <div id="oracle-fly" class="collapsed">
        <div class="oracle-trigger" onclick="toggleOracle()">🔑</div>
        <div class="drop-logo"></div>
        <div style="text-align: center; color: var(--cyan); font-weight: bold; letter-spacing: 1px;">ORACLE PRO 2.0</div>
        
        <div class="chat-box" id="chatBox">
            <div class="msg ai">LMSH HQ: Ожидаю авторизацию. Пароль 20+ символов. 🔑)</div>
        </div>

        <div class="input-wrap">
            <input type="text" id="userInput" placeholder="Команда для Оракула..." onkeypress="checkEnter(event)">
            <button class="banana-btn" onclick="sendToOracle()">▶</button>
        </div>
    </div>

    <script>
        function toggleOracle() {
            document.getElementById('oracle-fly').classList.toggle('collapsed');
        }

        function sendToOracle() {
            const input = document.getElementById('userInput');
            const box = document.getElementById('chatBox');
            if(!input.value) return;

            // Добавляем сообщение пользователя
            box.innerHTML += `<div class="msg user">${input.value}</div>`;
            
            const val = input.value.toLowerCase();
            input.value = '';

            // Реакция Оракула
            setTimeout(() => {
                let reply = "Запрос обработан. Данные синхронизированы с GitHub. 🔑)";
                if(val.includes("банан") || val.includes("banana")) {
                    reply = "🍌 АХАХАХА! БАНАН АКТИВИРОВАН! Чистка кода от кожуры завершена!";
                }
                if(val.includes("соседка")) {
                    reply = "Тактический режим 'Денежная растяжка' активен. Жду 250€. 💰";
                }
                box.innerHTML += `<div class="msg ai">${reply}</div>`;
                box.scrollTop = box.scrollHeight;
            }, 800);
        }

        function checkEnter(e) { if(e.key === 'Enter') sendToOracle(); }

        function saveToGit() {
            alert("Коммит сформирован! Протокол LMSH-V003 отправляет данные в облако GitHub. 🔑)");
        }
    </script>
</body>
</html>
