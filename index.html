<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notepad Helper Developers | LMSH</title>
    <style>
        :root {
            --bg-color: #0b0e14;
            --panel-bg: #161b22;
            --text-color: #e6edf3;
            --accent: #2f81f7;
            --border: #30363d;
            --radius-lg: 16px;
            --radius-md: 12px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color); color: var(--text-color);
            overflow: hidden;
        }

        /* Кастомный скролл */
        .scrollable { overflow-y: auto !important; }
        .scrollable::-webkit-scrollbar { width: 8px; }
        .scrollable::-webkit-scrollbar-track { background: var(--bg-color); }
        .scrollable::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; border: 2px solid var(--bg-color); }
        .scrollable::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        header {
            height: 60px; background: var(--panel-bg);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; animation: fadeIn 0.5s ease-out;
        }

        .main-container {
            display: grid; grid-template-columns: 280px 1fr 300px;
            height: calc(100vh - 60px); animation: fadeIn 0.7s ease-out;
        }

        .sidebar, .tools-panel { background: var(--panel-bg); padding: 20px; }
        .sidebar { border-right: 1px solid var(--border); }
        .tools-panel { border-left: 1px solid var(--border); }

        .tabs-bar { display: flex; background: var(--panel-bg); border-bottom: 1px solid var(--border); }
        .tab-item { padding: 12px 20px; cursor: pointer; color: #8b949e; border-bottom: 2px solid transparent; transition: 0.3s; }
        .tab-item.active { color: var(--text-color); border-bottom-color: var(--accent); }

        #content-code { flex: 1; background: #0d1117; }
        #json-display {
            margin: 0; padding: 20px; color: #d2a8ff;
            font-family: 'Consolas', monospace; font-size: 14px;
            outline: none; white-space: pre-wrap; width: 100%; height: 100%; box-sizing: border-box;
        }

        .chat-input-container { padding: 20px; border-top: 1px solid var(--border); }
        .chat-wrapper { position: relative; display: flex; align-items: center; }
        input[type="text"] {
            background: #0d1117; border: 1px solid var(--border); color: white;
            padding: 12px 45px 12px 15px; border-radius: var(--radius-md); width: 100%; outline: none;
        }
        #send-btn { position: absolute; right: 12px; background: none; border: none; color: var(--accent); cursor: pointer; font-size: 20px; transition: 0.2s; }
        #send-btn:hover { transform: scale(1.2) translateX(3px); }

        .world-box { background: #21262d; padding: 12px; border-radius: var(--radius-md); margin-top: 10px; border: 1px solid var(--border); }
        .room-item { margin-left: 15px; color: #8b949e; font-size: 13px; margin-top: 8px; cursor: pointer; }
        .room-item:hover { color: var(--accent); }

        textarea {
            width: 100%; height: 150px; background: #0d1117; color: white;
            border: 1px solid var(--border); border-radius: var(--radius-md); padding: 10px; resize: none; outline: none;
        }
    </style>
</head>
<body>
    <header>
        <div style="font-weight: bold; font-size: 18px;">LMSH <span style="color: #8b949e; font-weight: normal;">Notepad Helper 2</span></div>
        <button style="background:var(--accent); color:white; border:none; padding:8px 20px; border-radius:20px; font-weight: bold;">Oracle Premium</button>
    </header>

    <div class="main-container">
        <aside class="sidebar scrollable">
            <h3>My Pack</h3>
            <div style="width: 100%; height: 150px; background: #30363d; border-radius: var(--radius-lg); margin-bottom: 15px; display: flex; align-items: center; justify-content: center;">Photo Preview</div>
            <div id="pack-name-sidebar" style="font-weight: bold;">NamePack.worldpack</div>
            <p style="color: #8b949e; font-size: 12px;">Version: V003</p>
            
            <h4 style="margin-top: 30px;">Worlds & Hierarchy</h4>
            <div class="world-box">
                <b>🌍 World 1</b>
                <div class="room-item">🚪 Room 1 (Spawn)</div>
                <div class="room-item">🚪 Room 2 (Lab)</div>
            </div>
        </aside>

        <main style="display:flex; flex-direction:column;">
            <div class="tabs-bar">
                <div id="tab-code" class="tab-item active">📄 Code View</div>
                <div id="tab-oracle" class="tab-item">🧠 Oracle Intelligence</div>
            </div>
            <div id="content-code" class="scrollable">
                <pre id="json-display" contenteditable="true">// Вставьте код или загрузите .worldpack файл...</pre>
            </div>
            <div id="content-oracle" class="scrollable" style="display:none; padding:30px;">
                <div id="oracle-messages"></div>
            </div>
            <div class="chat-input-container">
                <div class="chat-wrapper">
                    <input type="text" id="oracle-input" placeholder="Спросить Оракула 2...">
                    <button id="send-btn">➔</button>
                </div>
            </div>
        </main>

        <aside class="tools-panel">
            <h4>Creative Ideas</h4>
            <textarea id="idea-text" placeholder="Заметки для Мурзика и Ламирка..."></textarea>
            <button id="upload-btn" style="width:100%; margin-top:15px; padding:12px; border-radius:var(--radius-md); background:#21262d; color:white; border:1px solid var(--border); cursor:pointer;">⬆ Upload File</button>
        </aside>
    </div>
    <script src="script.js"></script>
</body>
</html>
