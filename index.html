<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>LMSH HQ | Code Editor</title>
    <style>
        :root {
            --cyan: #00ffff;
            --purple: #8a2be2;
            --bg: #050508;
            --panel: rgba(20, 20, 30, 0.8);
        }

        body { 
            margin: 0; background: var(--bg); color: #fff; 
            font-family: 'Fira Code', monospace; display: flex; height: 100vh; 
        }

        /* Панель управления Паками (Слева) */
        .pack-explorer {
            width: 260px; background: var(--panel); border-right: 1px solid var(--purple);
            padding: 20px; display: flex; flex-direction: column;
        }

        .pack-item { 
            padding: 10px; margin: 5px 0; border: 1px solid transparent; 
            cursor: pointer; border-radius: 8px; font-size: 0.85em; transition: 0.3s;
        }
        .pack-item:hover { border-color: var(--cyan); background: rgba(0, 255, 255, 0.05); }
        .pack-active { border-color: var(--purple); background: rgba(138, 43, 226, 0.1); }

        /* Основной редактор (Центр) */
        .editor-container { flex: 1; display: flex; flex-direction: column; position: relative; }
        
        .editor-toolbar {
            height: 50px; background: rgba(0,0,0,0.5); display: flex; 
            align-items: center; padding: 0 20px; gap: 20px; border-bottom: 1px solid #333;
        }

        textarea {
            flex: 1; background: transparent; border: none; color: var(--cyan);
            padding: 25px; font-size: 15px; line-height: 1.5; outline: none; resize: none;
        }

        /* ЛОГО-КАПЛЯ (Вместо ключа) */
        .drop-trigger {
            position: fixed; top: 20px; right: 20px; width: 50px; height: 50px;
            background: linear-gradient(135deg, var(--cyan), var(--purple));
            border-radius: 50% 50% 50% 5%; transform: rotate(-45deg);
            cursor: pointer; z-index: 2000; transition: 0.5s;
            box-shadow: 0 0 15px var(--cyan);
        }
        .drop-trigger:hover { transform: rotate(-45deg) scale(1.1); box-shadow: 0 0 25px var(--purple); }

        /* Оверлей Оракула */
        #oracle-side {
            position: fixed; right: -350px; top: 0; width: 350px; height: 100%;
            background: rgba(5, 5, 10, 0.98); backdrop-filter: blur(20px);
            border-left: 1px solid var(--purple); transition: 0.4s; z-index: 1500;
            display: flex; flex-direction: column;
        }
        #oracle-side.active { right: 0; }

        .chat-area { flex: 1; overflow-y: auto; padding: 20px; font-family: sans-serif; font-size: 0.9em; }
        .msg { margin-bottom: 15px; padding: 10px; border-radius: 10px; border-left: 3px solid var(--purple); }
        
        .input-area { padding: 20px; border-top: 1px solid #222; display: flex; }
        input { flex: 1; background: #111; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 5px; }

        .status-bar { height: 30px; background: var(--purple); font-size: 0.7em; display: flex; align-items: center; padding: 0 20px; }
    </style>
</head>
<body>

    <div class="pack-explorer">
        <h2 style="font-size: 1em; color: var(--cyan);">LMSH PROJECTS</h2>
        <div class="pack-item pack-active">📦 Traitor_Level_2.1.json</div>
        <div class="pack-item">📦 Kosmo_Circle_3.3.json</div>
        <div class="pack-item">📦 MIUI_Optimiser_9a.json</div>
        <div style="margin-top: auto;">
            <button onclick="savePacks()" style="width: 100%; padding: 10px; background: var(--purple); border: none; color: white; border-radius: 5px; cursor: pointer;">GITHUB PUSH 🔑</button>
        </div>
    </div>

    <div class="editor-container">
        <div class="editor-toolbar">
            <span style="color: var(--purple);">FILE: Traitor_Level_2.1.json</span>
            <span id="save-status" style="font-size: 0.8em; opacity: 0.5;">Saved to LocalStorage</span>
        </div>
        <textarea id="codeEditor" spellcheck="false">
{
  "pack_name": "Traitor Level 2.1",
  "version": "LMSH-V003",
  "author": "Lamirk & Murzik",
  "content": {
    "rooms": [
      { "id": "spawn", "type": "banana_trap", "security": "Oracle_Pro" }
    ]
  }
}
        </textarea>
        <div class="status-bar">LMSH HQ PROTOCOL | MEMORY: STABLE | 🔑)</div>
    </div>

    <div class="drop-trigger" id="dropLogo" onclick="toggleOracle()"></div>

    <div id="oracle-side">
        <div style="padding: 40px 20px 10px; text-align: center; color: var(--cyan); font-weight: bold;">ORACLE AI ENGINE</div>
        <div class="chat-area" id="chat">
            <div class="msg"><b>Oracle:</b> Код пака загружен. Обнаружена структура Traitor Level. Готов к правкам. 💧</div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Команда для кода..." onkeypress="if(event.key==='Enter') send()">
        </div>
    </div>

    <script>
        function toggleOracle() {
            document.getElementById('oracle-side').classList.toggle('active');
        }

        function send() {
            let input = document.getElementById('userInput');
            let chat = document.getElementById('chat');
            if(!input.value) return;

            chat.innerHTML += `<div class="msg" style="border-left-color: var(--cyan)"><b>Инженер:</b> ${input.value}</div>`;
            
            // Логика Оракула: он анализирует код!
            setTimeout(() => {
                let code = document.getElementById('codeEditor').value;
                let reply = "Анализирую изменения в паке... 💧";
                
                if(input.value.toLowerCase().includes("ошибка")) {
                    reply = "💧 Проверка синтаксиса завершена. Ошибок в JSON не обнаружено. Чисто.";
                } else if(input.value.toLowerCase().includes("банан")) {
                    reply = "🍌 АХАХАХА! Внедряю банановую логику в структуру комнат!";
                }

                chat.innerHTML += `<div class="msg"><b>Oracle:</b> ${reply}</div>`;
                chat.scrollTop = chat.scrollHeight;
            }, 600);
            input.value = '';
        }

        function savePacks() {
            alert("Пак отправлен в репозиторий GitHub под контролем Оракула. 🔑)");
        }
    </script>
</body>
</html>
