<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notepad Helper Developers | LMSH</title>
    <style>
        :root {
            --bg-color: #0b0e14;
            --panel-bg: #161b22;
            --text-color: #e6edf3;
            --accent: #2f81f7;
            --border: #30363d;
            --radius-lg: 16px;
            --radius-md: 12px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color); color: var(--text-color);
            overflow: hidden;
        }

        /* ИСПРАВЛЕННЫЙ СКРОЛЛ */
        .scrollable {
            overflow-y: auto !important; /* Принудительный скролл */
            scrollbar-width: thin;
            scrollbar-color: var(--accent) var(--bg-color);
        }

        .scrollable::-webkit-scrollbar { width: 8px; }
        .scrollable::-webkit-scrollbar-track { background: var(--bg-color); }
        .scrollable::-webkit-scrollbar-thumb { 
            background-color: var(--border); 
            border-radius: 10px; 
            border: 2px solid var(--bg-color);
        }
        .scrollable::-webkit-scrollbar-thumb:hover { background-color: var(--accent); }

        header {
            height: 60px; background: var(--panel-bg);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px;
        }

        .main-container {
            display: grid;
            grid-template-columns: 280px 1fr 300px;
            height: calc(100vh - 60px);
        }

        .sidebar, .tools-panel { background: var(--panel-bg); padding: 20px; }
        .sidebar { border-right: 1px solid var(--border); }
        .tools-panel { border-left: 1px solid var(--border); }

        .editor-area { display: flex; flex-direction: column; background: var(--bg-color); position: relative; }
        
        .tabs-bar { display: flex; background: var(--panel-bg); border-bottom: 1px solid var(--border); }
        .tab-item { padding: 10px 20px; cursor: pointer; color: #8b949e; border-bottom: 2px solid transparent; }
        .tab-item.active { color: var(--text-color); border-bottom-color: var(--accent); }

        /* ОБЛАСТЬ КОДА С РЕДАКТИРОВАНИЕМ */
        #content-code { flex: 1; position: relative; background: #0d1117; }
        #json-display {
            margin: 0; padding: 20px; color: #d2a8ff;
            font-family: 'Consolas', monospace; font-size: 14px;
            outline: none; white-space: pre-wrap;
            width: 100%; height: 100%; box-sizing: border-box;
            display: block;
        }

        .chat-input-container { padding: 20px; border-top: 1px solid var(--border); }
        .chat-wrapper { position: relative; display: flex; align-items: center; }
        
        input[type="text"] {
            background: #0d1117; border: 1px solid var(--border);
            color: white; padding: 12px 45px 12px 15px;
            border-radius: var(--radius-md); width: 100%; outline: none;
        }

        #send-btn {
            position: absolute; right: 10px; background: none; border: none;
            color: var(--accent); cursor: pointer; font-size: 20px;
        }

        .world-box { background: #21262d; padding: 10px; border-radius: var(--radius-md); margin-top: 10px; }
        .room-link { margin-left: 15px; display: block; color: #8b949e; text-decoration: none; font-size: 13px; margin-top: 5px; }
        
        textarea {
            width: 100%; height: 150px; background: #0d1117; color: white;
            border: 1px solid var(--border); border-radius: var(--radius-md); padding: 10px;
            resize: none; outline: none;
        }
    </style>
</head>
<body>

<header>
    <div style="font-weight: bold;">LMSH Studio 2.0</div>
    <div class="nav-links">
        <span class="active">Home</span>
        <span>Packs</span>
    </div>
    <button style="background:var(--accent); color:white; border:none; padding:8px 15px; border-radius:20px;">Oracle Online</button>
</header>

<div class="main-container">
    <aside class="sidebar scrollable">
        <h3>My Pack</h3>
        <div id="pack-name-sidebar" style="font-weight: bold; margin-bottom: 20px;">NamePack.worldpack</div>
        <h4>Worlds & Hierarchy</h4>
        <div class="world-box">
            <span>🌍 World 1</span>
            <a href="#" class="room-link">🚪 Room 1 (Spawn)</a>
            <a href="#" class="room-link">🚪 Room 2 (Lab)</a>
        </div>
    </aside>

    <main class="editor-area">
        <div class="tabs-bar">
            <div id="tab-code" class="tab-item active">📄 Code</div>
            <div id="tab-oracle" class="tab-item">🧠 Oracle</div>
        </div>

        <!-- contenteditable="true" позволяет РЕДАКТИРОВАТЬ код прямо в браузере -->
        <div id="content-code" class="scrollable">
            <pre id="json-display" contenteditable="true">// Вставьте код или загрузите файл...</pre>
        </div>

        <div id="content-oracle" class="scrollable" style="display:none; padding:20px;">
            <div id="oracle-messages"></div>
        </div>
        
        <div class="chat-input-container">
            <div class="chat-wrapper">
                <input type="text" id="oracle-input" placeholder="Спросить Оракула...">
                <button id="send-btn">➔</button>
            </div>
        </div>
    </main>

    <aside class="tools-panel">
        <h4>Creative Ideas</h4>
        <!-- Правая колонка для идей -->
        <textarea id="idea-text" placeholder="Мурзик, запиши: добавить вокал Снежинки в 3-ю комнату..."></textarea>
        <button id="upload-btn" style="width:100%; margin-top:10px; padding:10px; cursor:pointer;">⬆ Загрузить Пак</button>
    </aside>
</div>

<script src="script.js"></script>
</body>
</html>
